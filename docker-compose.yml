version: "3.9"

services:
  synapsememo-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://synapsememo:synapsememo@postgres:5432/synapsememo
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: synapsememo
      POSTGRES_USER: synapsememo
      POSTGRES_PASSWORD: synapsememo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapsememo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
