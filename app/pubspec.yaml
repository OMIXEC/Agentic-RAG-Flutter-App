name: synapse_memo
description: SynapseMemo — Your AI-Powered Life Memory
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.2.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & API
  dio: ^5.7.0

  # Auth
  supabase_flutter: ^2.8.3

  # Media & Files
  cached_network_image: ^3.4.1
  file_picker: ^8.1.6
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.5

  # Mobile-native features
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.4
  local_auth: ^2.3.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - .env
